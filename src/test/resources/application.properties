# Test configuration.
#
# Makes @SpringBootTest tests self-contained: an in-memory H2 database and
# concrete admin-bootstrap values, so tests need neither a running PostgreSQL
# nor the production environment variables (WELLNARA_ADMIN_PASSWORD, DB_PASSWORD,
# ...). This file shadows src/main/resources/application.properties on the test
# classpath, so no profile is activated and application-dev (PostgreSQL) is not
# loaded. @DataJpaTest slices keep using their own auto-replaced H2 datasource.
#
# This mirrors the H2 + ddl-auto=create-drop approach planned for step 2.2
# (before Flyway is introduced).

spring.application.name=wellnara

# In-memory H2 in PostgreSQL-compatibility mode; schema built by Hibernate.
spring.datasource.url=jdbc:h2:mem:wellnara;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Admin bootstrap needs concrete values (no environment variables in tests).
wellnara.admin.username=admin
wellnara.admin.email=admin@wellnara.local
wellnara.admin.password=#admin@
wellnara.invitation.ttl-days=7

# Mail: a JavaMailSender bean is auto-configured from this host but is never
# actually contacted - mail-sending tests replace it with a @MockBean.
spring.mail.host=localhost
spring.mail.port=3025

wellnara.public-base-url=http://localhost:8080
wellnara.mail.from=test@wellnara.local

# Brute-force guard: small, deterministic values for tests.
wellnara.login.max-attempts=3
wellnara.login.lockout-minutes=15