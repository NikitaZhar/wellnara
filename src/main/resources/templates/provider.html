<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wellnara Provider</title>
    <script>
    function showSection(sectionId) {
        const sections = document.querySelectorAll('.provider-section');
        sections.forEach(section => {
            section.style.display = 'none';
        });

        const buttons = document.querySelectorAll('.tab-button');
        buttons.forEach(button => {
            button.disabled = false;
        });

        document.getElementById(sectionId).style.display = 'block';
        document.getElementById('tab-' + sectionId).disabled = true;
    }

    window.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        const section = params.get('section');

        if (section === 'offerings') {
            showSection('offerings-section');
            return;
        }

        if (section === 'calendar') {
            showSection('calendar-section');
            return;
        }

        showSection('clients-section');
    });
</script>
</head>
<body>

<h2>
    Wellnara: Provider -
    <span th:text="${providerName}"></span>
</h2>

<div th:if="${successMessage}" style="margin-bottom: 20px; color: green;">
    <p th:text="${successMessage}"></p>
</div>

<div th:if="${providerEmail}" style="margin-bottom: 20px;">
    <p>
        Your email:
        <strong th:text="${providerEmail}"></strong>
    </p>
</div>

<div style="margin-bottom: 20px;">
    <button id="tab-clients-section"
            class="tab-button"
            type="button"
            onclick="showSection('clients-section')">
        Clients
    </button>

    <button id="tab-offerings-section"
            class="tab-button"
            type="button"
            onclick="showSection('offerings-section')"
            style="margin-left: 10px;">
        Offerings
    </button>

    <button id="tab-calendar-section"
            class="tab-button"
            type="button"
            onclick="showSection('calendar-section')"
            style="margin-left: 10px;">
        Calendar
    </button>
</div>

<div id="clients-section" class="provider-section" style="display: none;">

    <h3>My clients</h3>

    <form th:action="@{/provider/invite-client}" method="post">
        <div>
            <label for="email">Enter Client email:</label>
            <input id="email" type="email" name="email" required>
        </div>

        <div style="margin-top: 15px;">
            <button type="submit">Press to invite client</button>
        </div>
    </form>

    <div th:if="${clientInviteError}" style="margin-top: 15px; color: red;">
        <p th:text="${clientInviteError}"></p>
    </div>

    <div th:if="${clientInviteLink}" style="margin-top: 20px;">
        <p>Client registration link:</p>
        <p>
            <a th:href="${clientInviteLink}"
               th:text="${clientInviteLink}"></a>
        </p>
    </div>

    <div style="margin-top: 30px;">
        <div th:if="${#lists.isEmpty(clients)}">
            <p>No clients found.</p>
        </div>

        <table th:if="${not #lists.isEmpty(clients)}"
               border="1"
               cellpadding="8"
               cellspacing="0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Invited at</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="clientLink : ${clients}">
                <td th:text="${clientLink.client.id}"></td>
                <td th:text="${clientLink.client.username}"></td>
                <td th:text="${clientLink.client.email}"></td>
                <td th:text="${clientLink.invitedAt}"></td>
                <td>
                    <form th:action="@{/provider/clients/{clientId}/delete(clientId=${clientLink.client.id})}"
                          method="post"
                          onsubmit="return confirm('Are you sure you want to delete this client?');">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="offerings-section" class="provider-section" style="display: none;">

    <h3>My offerings</h3>

    <form th:action="@{/provider/offerings}" method="post">
        <div>
            <label for="offeringName">Offering Name:</label>
            <input id="offeringName" type="text" name="name" required>
        </div>

        <div style="margin-top: 10px;">
            <label for="offeringDescription">Description:</label>
            <textarea id="offeringDescription" name="description" required></textarea>
        </div>

        <div style="margin-top: 10px;">
            <label for="pricePerSession">Price per session:</label>
            <input id="pricePerSession"
                   type="number"
                   name="pricePerSession"
                   step="0.01"
                   min="0"
                   required>
        </div>

        <div style="margin-top: 10px;">
            <label for="durationMinutes">Duration (minutes):</label>
            <input id="durationMinutes"
                   type="number"
                   name="durationMinutes"
                   min="1"
                   required>
        </div>

        <div style="margin-top: 15px;">
            <button type="submit">Create offering</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(offerings)}" style="margin-top: 20px;">
        <p>No offerings found.</p>
    </div>

    <table th:if="${not #lists.isEmpty(offerings)}"
       border="1"
       cellpadding="8"
       cellspacing="0"
       style="margin-top: 20px;">
    <thead>
    <tr>
        <th>ID</th>
        <th>Offering Name</th>
        <th>Description</th>
        <th>Price</th>
        <th>Duration</th>
        <th>Active</th>
        <th>Edit</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="offering : ${offerings}">
        <td th:text="${offering.id}"></td>
        <td th:text="${offering.name}"></td>
        <td th:text="${offering.description}"></td>
        <td th:text="${offering.pricePerSession}"></td>
        <td th:text="${offering.durationMinutes}"></td>
        <td th:text="${offering.active ? 'Active' : 'Inactive'}"></td>
        <td>
            <a th:href="@{/provider/offerings/{offeringId}/edit(offeringId=${offering.id})}">
                Edit
            </a>
        </td>
    </tr>
    </tbody>
</table>
</div>

<div id="calendar-section" class="provider-section" style="display: none;">

    <h3>Calendar</h3>

    <p>Calendar section is not implemented yet.</p>
</div>

<div style="margin-top: 30px;">
    <a th:href="@{/auth/logout}">Logout</a>
</div>

</body>
</html>
