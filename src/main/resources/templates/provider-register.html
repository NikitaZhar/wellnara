<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Provider Registration</title>
</head>
<body>

<h2>Provider Registration</h2>

<form th:action="@{/provider/register}" method="post">

    <input type="hidden" name="token" th:value="${token}"/>

    <div style="margin-bottom: 15px;">
        <p>
            Registration email:
            <strong th:text="${email}"></strong>
        </p>
    </div>

    <div>
        <label for="name">Логин:</label>
        <input id="name" type="text" name="name" th:value="${name}" required>
    </div>

    <div style="margin-top: 10px;">
        <label for="firstName">Имя:</label>
        <input id="firstName" type="text" name="firstName" th:value="${firstName}" required>
    </div>

    <div style="margin-top: 10px;">
        <label for="lastName">Фамилия:</label>
        <input id="lastName" type="text" name="lastName" th:value="${lastName}" required>
    </div>

    <div style="margin-top: 10px;">
        <label for="phone">Телефон (необязательно):</label>
        <input id="phone" type="tel" name="phone" th:value="${phone}"
               autocomplete="tel" placeholder="+421904746337"
               pattern="\+[1-9]\d{1,14}"
               title="Международный формат, например +421904746337">
    </div>

    <div style="margin-top: 10px;">
        <label for="password">Пароль:</label>
        <input id="password" type="password" name="password" required>
    </div>

    <div style="margin-top: 10px;">
        <label for="confirmPassword">Повторите пароль:</label>
        <input id="confirmPassword" type="password" name="confirmPassword" required>
    </div>

    <div style="margin-top: 15px;">
        <button type="submit">Зарегистрироваться</button>
    </div>

</form>

<div th:if="${error}" style="margin-top: 15px; color: red;">
    <p th:text="${error}"></p>
</div>

</body>
</html>
