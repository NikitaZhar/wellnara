spring.application.name=wellnara
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

wellnara.admin.username=${WELLNARA_ADMIN_USERNAME:admin}
wellnara.admin.email=${WELLNARA_ADMIN_EMAIL:admin@wellnara.local}
wellnara.admin.password=${WELLNARA_ADMIN_PASSWORD}
wellnara.invitation.ttl-days=7
wellnara.login.max-attempts=${WELLNARA_LOGIN_MAX_ATTEMPTS:5}
wellnara.login.lockout-minutes=${WELLNARA_LOGIN_LOCKOUT_MINUTES:15}