spring.datasource.url=jdbc:postgresql://localhost:5432/wellnara
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

wellnara.admin.username=${WELLNARA_ADMIN_USERNAME:admin}
wellnara.admin.email=${WELLNARA_ADMIN_EMAIL:admin@wellnara.local}
wellnara.admin.password=${WELLNARA_ADMIN_PASSWORD:#admin@}

spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

wellnara.public-base-url=http://localhost:8080
wellnara.mail.from=wellnara-dev@resend.dev

wellnara.invitation.ttl-days=7