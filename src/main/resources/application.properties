spring.datasource.url=jdbc:postgresql://localhost:5432/wellnara
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

wellnara.admin.username=${WELLNARA_ADMIN_USERNAME:admin}
wellnara.admin.email=${WELLNARA_ADMIN_EMAIL:admin@wellnara.local}
wellnara.admin.password=${WELLNARA_ADMIN_PASSWORD:#admin@}