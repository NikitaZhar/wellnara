spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wellnara}
spring.datasource.username=${DB_USERNAME:wellnara_admin}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

wellnara.public-base-url=http://localhost:8080
wellnara.mail.from=wellnara-dev@wellnara.local